name: sejily
description: "A new Flutter project."
publish_to: 'none' 
version: 1.0.0+1
environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.9.0
  retrofit: ^4.1.0
  flutter_secure_storage: ^9.2.4
  flutter_dotenv: ^6.0.0
  pretty_dio_logger: ^1.4.0
  go_router: ^14.6.2
  pinput: ^5.0.2
  country_code_picker: ^3.0.0
  dotted_border: ^2.1.0
  image_picker: ^1.1.2
  flutter_riverpod: ^2.5.1
  step_progress_indicator: ^1.0.2
  pin_code_fields: ^8.0.1
  hive: ^2.2.3
  file_picker: ^10.3.2
  open_file: ^3.5.10
  hive_flutter: ^1.1.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  path_provider: ^2.1.4
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6
  google_sign_in: ^6.2.1
  googleapis: ^14.0.0
  googleapis_auth: ^2.0.0
  http: ^1.2.2
  flutter_svg: ^2.2.1
  skeletonizer: ^2.1.0+1
  cached_network_image: ^3.4.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  retrofit_generator: ^8.1.0

flutter_icons:
  android: true 
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_foreground: "assets/images/logo.png"
  adaptive_icon_background: "#f0f1f1"

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
  fonts:
    - family: IBM_Plex_Sans_Arabic
      fonts:
        - asset: assets/fonts/IBM_Plex_Sans_Arabic/IBMPlexSansArabic-Regular.ttf
        - asset: assets/fonts/IBM_Plex_Sans_Arabic/IBMPlexSansArabic-Bold.ttf
          weight: 700
        - asset: assets/fonts/IBM_Plex_Sans_Arabic/IBMPlexSansArabic-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBM_Plex_Sans_Arabic/IBMPlexSansArabic-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/IBM_Plex_Sans_Arabic/IBMPlexSansArabic-Light.ttf
          weight: 300
        - asset: assets/fonts/IBM_Plex_Sans_Arabic/IBMPlexSansArabic-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/IBM_Plex_Sans_Arabic/IBMPlexSansArabic-Thin.ttf
          weight: 100
